<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitnessPlan Account</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
padding:24px;
}

.wrap{
max-width:520px;
margin:auto;
}

.card{
background:#1e293b;
padding:22px;
border-radius:18px;
margin-bottom:18px;
border:1px solid #334155;
}

h1,h2{
margin-top:0;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:10px;
border:1px solid #475569;
background:#0f172a;
color:white;
box-sizing:border-box;
}

button{
width:100%;
padding:13px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
margin-bottom:10px;
}

button:hover{
filter:brightness(1.07);
}

.secondary{
background:#475569;
}

.hidden{
display:none;
}

.status{
margin-top:10px;
font-size:0.95rem;
color:#cbd5e1;
}
</style>
</head>

<body>
<div class="wrap">

<h1>FitnessPlan</h1>

<div class="card" id="homeCard">
<h2>Account</h2>
<button id="showSignup">Sign Up</button>
<button class="secondary" id="showLogin">Log In</button>
<div class="status" id="statusText"></div>
</div>

<div class="card hidden" id="signupCard">
<h2>Create Your Account</h2>

<input id="signupName" placeholder="Username">
<input id="signupEmail" placeholder="Email">
<input id="signupPassword" type="password" placeholder="Password">
<input id="signupDob" type="date">

<button id="signupBtn">Create Account</button>
<button class="secondary" id="back1">Back</button>
</div>

<div class="card hidden" id="loginCard">
<h2>Log In</h2>

<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">

<button id="loginBtn">Log In</button>
<button class="secondary" id="back2">Back</button>
</div>

</div>

<script>
const API="https://fitnessplan-backend.cosmowind2013.workers.dev";

const homeCard=document.getElementById("homeCard");
const signupCard=document.getElementById("signupCard");
const loginCard=document.getElementById("loginCard");
const statusText=document.getElementById("statusText");

function showHome(){
homeCard.classList.remove("hidden");
signupCard.classList.add("hidden");
loginCard.classList.add("hidden");
}

function showSignup(){
homeCard.classList.add("hidden");
signupCard.classList.remove("hidden");
loginCard.classList.add("hidden");
}

function showLogin(){
homeCard.classList.add("hidden");
signupCard.classList.add("hidden");
loginCard.classList.remove("hidden");
}

document.getElementById("showSignup").onclick=showSignup;
document.getElementById("showLogin").onclick=showLogin;
document.getElementById("back1").onclick=showHome;
document.getElementById("back2").onclick=showHome;

document.getElementById("signupBtn").onclick=async()=>{
statusText.textContent="Creating account...";

try{
const res=await fetch(API+"/signup",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
displayName:document.getElementById("signupName").value,
email:document.getElementById("signupEmail").value,
password:document.getElementById("signupPassword").value,
dob:document.getElementById("signupDob").value
})
});

const data=await res.json();

if(data.ok){
localStorage.setItem("fitnessplan_token",data.token);
statusText.textContent="Account created successfully.";
showHome();
}else{
statusText.textContent=data.error || "Signup failed.";
}

}catch(e){
statusText.textContent="Signup failed.";
}
};

document.getElementById("loginBtn").onclick=async()=>{
statusText.textContent="Logging in...";

try{
const res=await fetch(API+"/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email:document.getElementById("loginEmail").value,
password:document.getElementById("loginPassword").value
})
});

const data=await res.json();

if(data.ok){
localStorage.setItem("fitnessplan_token",data.token);
statusText.textContent="Logged in successfully.";
showHome();
}else{
statusText.textContent=data.error || "Login failed.";
}

}catch(e){
statusText.textContent="Login failed.";
}
};
</script>

</body>
</html>
