<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitnessPlan Account</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">FitnessPlan</div>
    <div class="topbar-actions">
      <a class="nav-btn secondary" href="./index.html?planner=1">Back to planner</a>
      <a class="nav-btn secondary" href="./dashboard.html">Dashboard</a>
    </div>
  </header>

  <main class="account-wrap">
    <section class="card" id="homeCard">
      <h2>Account</h2>
      <div class="button-row">
        <button type="button" id="showSignup">Sign Up</button>
        <button type="button" class="secondary" id="showLogin">Log In</button>
      </div>
      <div class="status-line" id="statusText">Not signed in.</div>
    </section>

    <section class="card hidden" id="signupCard">
      <h2>Create your account</h2>

      <label>Username</label>
      <input id="signupName" type="text" placeholder="Username" />

      <label>Email</label>
      <input id="signupEmail" type="email" placeholder="Email" />

      <label>Password</label>
      <input id="signupPassword" type="password" placeholder="Password" />

      <label>Date of birth</label>
      <input id="signupDob" type="text" inputmode="numeric" placeholder="YYYY-MM-DD" />

      <div class="button-row">
        <button type="button" id="signupBtn">Create Account</button>
        <button type="button" class="secondary" id="back1">Back</button>
      </div>
    </section>

    <section class="card hidden" id="loginCard">
      <h2>Welcome back</h2>

      <label>Email</label>
      <input id="loginEmail" type="email" placeholder="Email" />

      <label>Password</label>
      <input id="loginPassword" type="password" placeholder="Password" />

      <div class="button-row">
        <button type="button" id="loginBtn">Log In</button>
        <button type="button" class="secondary" id="back2">Back</button>
      </div>
    </section>
  </main>

  <script>
const API = "https://fitnessplan-backend.cosmowind2013.workers.dev";

document.addEventListener("DOMContentLoaded", () => {
  const homeCard = document.getElementById("homeCard");
  const signupCard = document.getElementById("signupCard");
  const loginCard = document.getElementById("loginCard");
  const statusText = document.getElementById("statusText");

  const showSignupBtn = document.getElementById("showSignup");
  const showLoginBtn = document.getElementById("showLogin");
  const signupBtn = document.getElementById("signupBtn");
  const loginBtn = document.getElementById("loginBtn");
  const back1Btn = document.getElementById("back1");
  const back2Btn = document.getElementById("back2");

  const signupName = document.getElementById("signupName");
  const signupEmail = document.getElementById("signupEmail");
  const signupPassword = document.getElementById("signupPassword");
  const signupDob = document.getElementById("signupDob");

  const loginEmail = document.getElementById("loginEmail");
  const loginPassword = document.getElementById("loginPassword");

  function setStatus(message, type = "") {
    if (!statusText) {
      alert(message);
      return;
    }

    statusText.textContent = message;
    statusText.className = "status-line";
    if (type) statusText.classList.add(type);
  }

  function showHome() {
    if (homeCard) homeCard.classList.remove("hidden");
    if (signupCard) signupCard.classList.add("hidden");
    if (loginCard) loginCard.classList.add("hidden");
  }

  function showSignup() {
    if (homeCard) homeCard.classList.add("hidden");
    if (signupCard) signupCard.classList.remove("hidden");
    if (loginCard) loginCard.classList.add("hidden");
    setStatus("Create your account.");
  }

  function showLogin() {
    if (homeCard) homeCard.classList.add("hidden");
    if (signupCard) signupCard.classList.add("hidden");
    if (loginCard) loginCard.classList.remove("hidden");
    setStatus("Log in to your account.");
  }

  function normalizeDateInput(value) {
    const digits = value.replace(/\D/g, "").slice(0, 8);
    if (digits.length <= 4) return digits;
    if (digits.length <= 6) return `${digits.slice(0, 4)}-${digits.slice(4)}`;
    return `${digits.slice(0, 4)}-${digits.slice(4, 6)}-${digits.slice(6, 8)}`;
  }

  function isValidDob(value) {
    if (!/^\d{4}-\d{2}-\d{2}$/.test(value)) return false;
    const date = new Date(`${value}T12:00:00`);
    return !Number.isNaN(date.getTime());
  }

  async function apiRequest(path, body, token = "") {
    const headers = { "Content-Type": "application/json" };
    if (token) headers.Authorization = `Bearer ${token}`;

    const response = await fetch(`${API}${path}`, {
      method: "POST",
      headers,
      body: JSON.stringify(body)
    });

    const text = await response.text();

    let data;
    try {
      data = JSON.parse(text);
    } catch {
      data = {
        ok: false,
        error: text || `Request failed with status ${response.status}`
      };
    }

    return data;
  }

  async function trySavePendingPlan() {
    const pendingRaw = localStorage.getItem("fitnessplan_pending_plan");
    const token = localStorage.getItem("fitnessplan_token");

    if (!pendingRaw) return;

    try {
      const pending = JSON.parse(pendingRaw);

      if (pending.plan) {
        localStorage.setItem("fitnessplan_latest_plan", JSON.stringify(pending.plan));
      }

      if (!token) return;

      const data = await apiRequest(
        "/save-plan",
        {
          planName: pending.planName,
          startDate: pending.startDate,
          plan: pending.plan
        },
        token
      );

      if (data.ok) {
        localStorage.removeItem("fitnessplan_pending_plan");
      }
    } catch (error) {
      console.error("Pending plan save failed:", error);
    }
  }

  async function finishAuth(data, message) {
    if (!data || !data.ok || !data.token || !data.user) {
      setStatus("Login worked, but token or user data is missing.", "bad");
      return;
    }

    localStorage.setItem("fitnessplan_token", data.token);
    localStorage.setItem("fitnessplan_user", JSON.stringify(data.user));

    setStatus(message, "ok");

    await trySavePendingPlan();

    window.location.href = "./dashboard.html";
  }

  async function handleSignup() {
    const displayName = signupName ? signupName.value.trim() : "";
    const email = signupEmail ? signupEmail.value.trim().toLowerCase() : "";
    const password = signupPassword ? signupPassword.value : "";
    const dob = signupDob ? signupDob.value.trim() : "";

    if (!displayName || !email || !password || !dob) {
      setStatus("Please fill out username, email, password, and date of birth.", "bad");
      return;
    }

    if (!isValidDob(dob)) {
      setStatus("Date of birth must be in YYYY-MM-DD format.", "bad");
      return;
    }

    setStatus("Creating account...");
    if (signupBtn) signupBtn.disabled = true;

    try {
      const data = await apiRequest("/signup", {
        displayName,
        email,
        password,
        dob
      });

      if (data.ok) {
        await finishAuth(data, `Account created. Signed in as ${data.user.username}.`);
        return;
      }

      setStatus(data.details || data.error || "Signup failed.", "bad");
    } catch (error) {
      console.error("Signup failed:", error);
      setStatus(`Signup failed: ${error.message}`, "bad");
    } finally {
      if (signupBtn) signupBtn.disabled = false;
    }
  }

  async function handleLogin() {
    const email = loginEmail ? loginEmail.value.trim().toLowerCase() : "";
    const password = loginPassword ? loginPassword.value : "";

    if (!email || !password) {
      setStatus("Please enter email and password.", "bad");
      return;
    }

    setStatus("Logging in...");
    if (loginBtn) loginBtn.disabled = true;

    try {
      const data = await apiRequest("/login", {
        email,
        password
      });

      if (data.ok) {
        await finishAuth(data, `Logged in as ${data.user.username}.`);
        return;
      }

      setStatus(data.details || data.error || "Login failed.", "bad");
    } catch (error) {
      console.error("Login failed:", error);
      setStatus(`Login failed: ${error.message}`, "bad");
    } finally {
      if (loginBtn) loginBtn.disabled = false;
    }
  }

  if (signupDob) {
    signupDob.addEventListener("input", (e) => {
      e.target.value = normalizeDateInput(e.target.value);
    });
  }

  if (showSignupBtn) showSignupBtn.addEventListener("click", showSignup);
  if (showLoginBtn) showLoginBtn.addEventListener("click", showLogin);

  if (back1Btn) {
    back1Btn.addEventListener("click", () => {
      showHome();
      setStatus("Not signed in.");
    });
  }

  if (back2Btn) {
    back2Btn.addEventListener("click", () => {
      showHome();
      setStatus("Not signed in.");
    });
  }

  if (signupBtn) signupBtn.addEventListener("click", handleSignup);
  if (loginBtn) loginBtn.addEventListener("click", handleLogin);

  [signupName, signupEmail, signupPassword, signupDob].forEach((input) => {
    if (!input) return;
    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        handleSignup();
      }
    });
  });

  [loginEmail, loginPassword].forEach((input) => {
    if (!input) return;
    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        handleLogin();
      }
    });
  });

  const savedUserRaw = localStorage.getItem("fitnessplan_user");
  if (savedUserRaw) {
    try {
      const user = JSON.parse(savedUserRaw);
      setStatus(`Already signed in as ${user.username}.`, "ok");
    } catch {
      setStatus("Not signed in.");
    }
  }
});
</script>
</body>
</html>
