<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitnessPlan Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">FitnessPlan</div>
    <div class="topbar-actions">
      <a class="nav-btn secondary" href="./index.html">Planner</a>
      <a class="nav-btn secondary" href="./account-test.html">Account</a>
      <button class="secondary" id="logoutBtn">Log Out</button>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h1>Your Dashboard</h1>
      <p class="helper">Track the current week, log sets and reps, and see what is ahead.</p>
    </section>

    <section class="dashboard-grid">
      <section class="card">
        <h2>Profile</h2>
        <div class="info-list" id="profileBox">Loading profile...</div>

        <div class="streak-box" id="streakBox">
          <strong>Workout streak:</strong> 0
        </div>
      </section>

      <section class="card">
        <h2>Saved plan</h2>
        <div id="planSummaryBox" class="empty-box">Loading your saved plan...</div>
      </section>
    </section>

    <section class="card">
      <h2>Week tracker</h2>
      <div id="weekTrackerBox" class="empty-box">Loading week tracker...</div>
    </section>

    <section class="card">
      <h2>Calendar ahead</h2>
      <div id="calendarBox" class="empty-box">Loading calendar...</div>
    </section>
  </main>

  <script>
    const API = "https://fitnessplan-backend.cosmowind2013.workers.dev";
    const token = localStorage.getItem("fitnessplan_token");

    const profileBox = document.getElementById("profileBox");
    const planSummaryBox = document.getElementById("planSummaryBox");
    const weekTrackerBox = document.getElementById("weekTrackerBox");
    const calendarBox = document.getElementById("calendarBox");
    const streakBox = document.getElementById("streakBox");

    function getUser() {
      try {
        return JSON.parse(localStorage.getItem("fitnessplan_user") || "null");
      } catch {
        return null;
      }
    }

    function getPlan() {
      try {
        return JSON.parse(localStorage.getItem("fitnessplan_latest_plan") || "null");
      } catch {
        return null;
      }
    }

    function getTrackerKey(plan) {
      const user = getUser();
      const userId = user?.email || "guest";
      return `fitnessplan_tracker_${userId}_${plan.planName}_${plan.schedule[0]?.date || "local"}`;
    }

    function loadTracker(plan) {
      try {
        return JSON.parse(localStorage.getItem(getTrackerKey(plan)) || '{"days":{}}');
      } catch {
        return { days: {} };
      }
    }

    function saveTracker(plan, tracker) {
      localStorage.setItem(getTrackerKey(plan), JSON.stringify(tracker));
    }

    async function apiGet(path) {
      const res = await fetch(`${API}${path}`, {
        headers: token ? { "Authorization": `Bearer ${token}` } : {}
      });
      return res.json();
    }

    function renderProfile(user) {
      if (!user) {
        profileBox.innerHTML = `
          <strong>Mode:</strong> Guest local preview<br>
          <strong>Status:</strong> Not logged in<br>
          <strong>Tip:</strong> You can still test the tracker locally.
        `;
        return;
      }

      profileBox.innerHTML = `
        <strong>Username:</strong> ${user.username}<br>
        <strong>Email:</strong> ${user.email}<br>
        <strong>Age:</strong> ${user.age}<br>
        <strong>Age band:</strong> ${user.ageBand}<br>
        <strong>Parent or guardian required:</strong> ${user.parentRequired ? "Yes" : "No"}
      `;
    }

    function splitIntoWeeks(schedule) {
      const weeks = [];
      for (let i = 0; i < schedule.length; i += 7) {
        weeks.push(schedule.slice(i, i + 7));
      }
      return weeks;
    }

    function formatWeekTitle(week) {
      if (!week.length) return "Week";
      return `Week of ${week[0].dateLabel}`;
    }

    function workoutDayLetter(index) {
      return String.fromCharCode(65 + index);
    }

    function getExerciseHistory(plan, tracker, exerciseId, beforeDate) {
      const history = [];

      plan.schedule
        .filter((day) => day.date < beforeDate && day.type === "workout")
        .forEach((day) => {
          const logForDay = tracker.days?.[day.date]?.[exerciseId];
          if (logForDay && Array.isArray(logForDay.values)) {
            history.push(logForDay);
          }
        });

      return history;
    }

    function allSetsMet(values, target) {
      if (!Array.isArray(values) || values.length !== target.length) return false;
      return values.every((v, i) => Number(v) >= Number(target[i]));
    }

    function computeGoalState(exercise, history) {
      if (exercise.type === "run" || exercise.type === "mobility") {
        return {
          targetArray: [],
          goalText: exercise.targetText,
          readyNow: false,
          maxTestDue: false,
          stage: 0
        };
      }

      if (exercise.mode === "ladder") {
        let current = exercise.low;
        let stage = 0;

        history.forEach((entry) => {
          const target = Array(exercise.sets).fill(current);
          if (allSetsMet(entry.values, target)) {
            if (current < exercise.high) {
              current += 1;
            } else {
              stage += 1;
              current = exercise.low;
            }
          }
        });

        const targetArray = Array(exercise.sets).fill(current);
        const readyNow = current === exercise.high;
        const maxTestDue = history.length > 0 && history.length % 6 === 0;

        return {
          targetArray,
          goalText: `${exercise.sets} sets of ${current}`,
          readyNow,
          maxTestDue,
          stage
        };
      }

      if (exercise.mode === "hold") {
        let current = exercise.low;

        history.forEach((entry) => {
          const target = Array(exercise.sets).fill(current);
          if (allSetsMet(entry.values, target)) {
            current = Math.min(exercise.high, current + (exercise.step || 5));
          }
        });

        const targetArray = Array(exercise.sets).fill(current);
        const maxTestDue = history.length >= 6;

        return {
          targetArray,
          goalText: `${exercise.sets} sets of ${current} sec`,
          readyNow: current >= Math.round(exercise.high * 0.8),
          maxTestDue,
          stage: 0
        };
      }

      let current = exercise.low;
      let topHits = 0;
      let stage = 0;

      history.forEach((entry) => {
        const target = Array(exercise.sets).fill(current);
        const success = allSetsMet(entry.values, target);

        if (!success) {
          topHits = 0;
          return;
        }

        if (current < exercise.high) {
          current += 1;
          topHits = 0;
        } else {
          topHits += 1;
          if (topHits >= 2) {
            stage += 1;
            current = exercise.low;
            topHits = 0;
          }
        }
      });

      const targetArray = Array(exercise.sets).fill(current);
      const readyNow = current === exercise.high;
      const maxTestDue = history.length > 0 && history.length % 6 === 0;

      return {
        targetArray,
        goalText: `${exercise.sets} sets of ${current}`,
        readyNow,
        maxTestDue,
        stage
      };
    }

    function countWorkoutStreak(plan, tracker) {
      const completedDates = plan.schedule
        .filter((day) => day.type === "workout")
        .map((day) => {
          const dayLogs = tracker.days?.[day.date];
          if (!dayLogs) return false;
          return Object.keys(dayLogs).length > 0;
        });

      let streak = 0;
      for (let i = completedDates.length - 1; i >= 0; i -= 1) {
        if (completedDates[i]) streak += 1;
        else break;
      }
      return streak;
    }

    function renderPlanSummary(plan) {
      if (!plan) {
        planSummaryBox.className = "empty-box";
        planSummaryBox.innerHTML = `No plan found yet. Build one first.`;
        return;
      }

      planSummaryBox.className = "summary-box";
      planSummaryBox.textContent = plan.summary;
    }

    function createExerciseTracker(plan, tracker, day, exercise) {
      const history = getExerciseHistory(plan, tracker, exercise.id, day.date);
      const goalState = computeGoalState(exercise, history);

      const wrap = document.createElement("div");
      wrap.className = "tracker-exercise";

      const head = document.createElement("div");
      head.className = "tracker-ex-head";

      const left = document.createElement("div");
      left.innerHTML = `
        <div class="tracker-ex-name">${exercise.name}</div>
        <div class="helper">Goal: ${goalState.goalText}</div>
        <div class="helper">Tempo: ${exercise.tempo || "By feel"} | Rest: ${exercise.rest || "By feel"}</div>
      `;

      const right = document.createElement("div");
      right.className = `tracker-chip ${goalState.readyNow ? "ready" : ""}`;
      right.textContent = goalState.readyNow ? "Ready soon" : `Stage ${goalState.stage + 1}`;

      head.appendChild(left);
      head.appendChild(right);
      wrap.appendChild(head);

      if (exercise.type === "run" || exercise.type === "mobility") {
        wrap.innerHTML += `
          <div class="tracker-help"><strong>Starter:</strong> ${exercise.starter}</div>
          <div class="tracker-help"><strong>Progression:</strong> ${exercise.progression}</div>
          <div class="tracker-help"><strong>Ready when:</strong> ${exercise.readyWhen}</div>
          <div class="tracker-help"><strong>Max test:</strong> ${exercise.maxTest}</div>
        `;
        return wrap;
      }

      const table = document.createElement("div");
      table.className = "tracker-table";

      const header = document.createElement("div");
      header.className = "tracker-row header";
      header.innerHTML = `<div>Set</div><div>Goal</div><div>Log</div>`;
      table.appendChild(header);

      const existing = tracker.days?.[day.date]?.[exercise.id]?.values || [];

      goalState.targetArray.forEach((target, i) => {
        const row = document.createElement("div");
        row.className = "tracker-row";
        row.innerHTML = `
          <div>Set ${i + 1}</div>
          <div class="tracker-goal">${exercise.type === "seconds" ? `${target} sec` : `${target} reps`}</div>
          <div><input class="small-input" data-day="${day.date}" data-ex="${exercise.id}" data-set="${i}" type="text" inputmode="numeric" value="${existing[i] || ""}" /></div>
        `;
        table.appendChild(row);
      });

      wrap.appendChild(table);

      wrap.innerHTML += `
        <div class="tracker-help"><strong>Starter:</strong> ${exercise.starter}</div>
        <div class="tracker-help"><strong>Progression:</strong> ${exercise.progression}</div>
        <div class="tracker-help"><strong>Ready when:</strong> ${exercise.readyWhen}</div>
        <div class="tracker-help"><strong>Max test:</strong> ${exercise.maxTest}${goalState.maxTestDue ? " You are due soon." : ""}</div>
      `;

      return wrap;
    }

    function renderWeekTracker(plan) {
      const tracker = loadTracker(plan);
      const weeks = splitIntoWeeks(plan.schedule);

      weekTrackerBox.className = "";
      weekTrackerBox.innerHTML = "";

      weeks.forEach((week) => {
        const section = document.createElement("section");
        section.className = "week-section";

        const title = document.createElement("div");
        title.className = "week-title";
        title.textContent = formatWeekTitle(week);
        section.appendChild(title);

        const grid = document.createElement("div");
        grid.className = "week-grid";

        let letterIndex = 0;

        week.forEach((day) => {
          const card = document.createElement("div");
          card.className = `day-card ${day.type === "rest" ? "rest" : ""}`;

          let letterHtml = "";
          if (day.type === "workout") {
            letterHtml = `<span class="day-letter">${workoutDayLetter(letterIndex)}</span>`;
            letterIndex += 1;
          }

          card.innerHTML = `
            <div class="day-top">
              <div>
                <div>${letterHtml}</div>
                <div class="day-date">${day.dateLabel}</div>
                <div class="helper">${day.title}</div>
              </div>
              <span class="badge ${day.type === "rest" ? "rest" : ""}">${day.goal}</span>
            </div>
          `;

          if (day.type === "rest") {
            const p = document.createElement("div");
            p.className = "helper";
            p.textContent = "Recovery day.";
            card.appendChild(p);
            grid.appendChild(card);
            return;
          }

          if (day.warmup?.length) {
            const warm = document.createElement("div");
            warm.className = "session-block";
            warm.innerHTML = "<h4>Warm-up</h4>";
            const ul = document.createElement("ul");
            day.warmup.forEach((item) => {
              const li = document.createElement("li");
              li.textContent = item;
              ul.appendChild(li);
            });
            warm.appendChild(ul);
            card.appendChild(warm);
          }

          day.exercises.forEach((exercise) => {
            card.appendChild(createExerciseTracker(plan, tracker, day, exercise));
          });

          if (day.cooldown?.length) {
            const cool = document.createElement("div");
            cool.className = "session-block";
            cool.innerHTML = "<h4>Cooldown</h4>";
            const ul = document.createElement("ul");
            day.cooldown.forEach((item) => {
              const li = document.createElement("li");
              li.textContent = item;
              ul.appendChild(li);
            });
            cool.appendChild(ul);
            card.appendChild(cool);
          }

          const actions = document.createElement("div");
          actions.className = "tracker-actions";

          const saveBtn = document.createElement("button");
          saveBtn.textContent = "Save day log";
          saveBtn.addEventListener("click", () => {
            const allInputs = card.querySelectorAll("input[data-day]");
            const grouped = {};

            allInputs.forEach((input) => {
              const exId = input.dataset.ex;
              if (!grouped[exId]) grouped[exId] = [];
              grouped[exId][Number(input.dataset.set)] = Number(input.value || 0);
            });

            const nextTracker = loadTracker(plan);
            if (!nextTracker.days[day.date]) nextTracker.days[day.date] = {};

            Object.entries(grouped).forEach(([exId, values]) => {
              nextTracker.days[day.date][exId] = {
                values,
                savedAt: new Date().toISOString()
              };
            });

            saveTracker(plan, nextTracker);
            renderWeekTracker(plan);
            renderCalendar(plan);
            streakBox.innerHTML = `<strong>Workout streak:</strong> ${countWorkoutStreak(plan, nextTracker)}`;
          });

          actions.appendChild(saveBtn);
          card.appendChild(actions);
          grid.appendChild(card);
        });

        section.appendChild(grid);
        weekTrackerBox.appendChild(section);
      });

      streakBox.innerHTML = `<strong>Workout streak:</strong> ${countWorkoutStreak(plan, tracker)}`;
    }

    function renderCalendar(plan) {
      calendarBox.className = "calendar-grid";
      calendarBox.innerHTML = "";

      const weeks = splitIntoWeeks(plan.schedule);

      weeks.forEach((week) => {
        let letterIndex = 0;

        week.forEach((day) => {
          const card = document.createElement("div");
          card.className = "calendar-card";

          const letter = day.type === "workout" ? workoutDayLetter(letterIndex++) : "Rest";
          const exerciseNames = day.exercises?.map((ex) => ex.name).join(", ") || "Recovery";

          card.innerHTML = `
            <div class="day-top">
              <div>
                <div class="day-date">${day.dateLabel}</div>
                <div class="helper">Day ${letter}</div>
              </div>
              <span class="badge ${day.type === "rest" ? "rest" : ""}">${day.goal}</span>
            </div>
            <div class="helper">${exerciseNames}</div>
          `;

          calendarBox.appendChild(card);
        });
      });
    }

    async function loadDashboard() {
      let user = getUser();
      let plan = getPlan();

      if (token) {
        try {
          const me = await apiGet("/me");
          if (me.ok) {
            user = me.user;
            localStorage.setItem("fitnessplan_user", JSON.stringify(user));
          }
        } catch {}
      }

      renderProfile(user);

      if (token) {
        try {
          const planData = await apiGet("/my-plan");
          if (planData.ok && planData.plan) {
            plan = planData.plan;
            localStorage.setItem("fitnessplan_latest_plan", JSON.stringify(plan));
          }
        } catch {}
      }

      renderPlanSummary(plan);

      if (!plan) {
        weekTrackerBox.className = "empty-box";
        weekTrackerBox.textContent = "No plan found yet.";
        calendarBox.className = "empty-box";
        calendarBox.textContent = "No plan found yet.";
        return;
      }

      renderWeekTracker(plan);
      renderCalendar(plan);
    }

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      if (token) {
        try {
          await fetch(`${API}/logout`, {
            method: "POST",
            headers: {
              "Authorization": `Bearer ${token}`
            }
          });
        } catch {}
      }

      localStorage.removeItem("fitnessplan_token");
      localStorage.removeItem("fitnessplan_user");
      window.location.href = "./account-test.html";
    });

    loadDashboard();
  </script>
</body>
</html>
