<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitnessPlan Dashboard</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">FitnessPlan</div>
    <div class="topbar-actions">
      <a class="nav-btn secondary" href="./index.html?planner=1">Planner</a>
      <a class="nav-btn secondary" href="./account-test.html">Account</a>
      <button class="secondary" id="logoutBtn">Log Out</button>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h1>Your Dashboard</h1>
      <p class="helper">Today’s workout unlocks on the actual day.</p>
    </section>

    <section class="dashboard-grid">
      <section class="card">
        <h2>Profile</h2>
        <div class="info-list" id="profileBox">Loading profile...</div>

        <div class="streak-box" id="streakBox">
          <strong>Workout streak:</strong> 0
        </div>
      </section>

      <section class="card">
        <h2>Plan</h2>
        <div id="planSummaryBox" class="empty-box">Loading your plan...</div>
      </section>
    </section>

    <section class="card">
      <h2>This week</h2>
      <div id="weekTrackerBox" class="empty-box">Loading week tracker...</div>
    </section>

    <section class="card">
      <h2>Calendar ahead</h2>
      <div id="calendarBox" class="empty-box">Loading calendar...</div>
    </section>
  </main>

  <script>
    const API = "https://fitnessplan-backend.cosmowind2013.workers.dev";
    const token = localStorage.getItem("fitnessplan_token");

    const profileBox = document.getElementById("profileBox");
    const planSummaryBox = document.getElementById("planSummaryBox");
    const weekTrackerBox = document.getElementById("weekTrackerBox");
    const calendarBox = document.getElementById("calendarBox");
    const streakBox = document.getElementById("streakBox");

    function getUser() {
      try {
        return JSON.parse(localStorage.getItem("fitnessplan_user") || "null");
      } catch {
        return null;
      }
    }

    function getPlan() {
      try {
        return JSON.parse(localStorage.getItem("fitnessplan_latest_plan") || "null");
      } catch {
        return null;
      }
    }

    function getTrackerKey(plan) {
      const user = getUser();
      const userId = user?.email || "guest";
      return `fitnessplan_tracker_${userId}_${plan.planName}_${plan.schedule?.[0]?.date || "local"}`;
    }

    function loadTracker(plan) {
      try {
        return JSON.parse(localStorage.getItem(getTrackerKey(plan)) || '{"days":{}}');
      } catch {
        return { days: {} };
      }
    }

    function saveTracker(plan, tracker) {
      localStorage.setItem(getTrackerKey(plan), JSON.stringify(tracker));
    }

    async function apiGet(path) {
      const headers = {};
      if (token) headers.Authorization = `Bearer ${token}`;

      const res = await fetch(`${API}${path}`, { headers });
      const text = await res.text();

      try {
        return JSON.parse(text);
      } catch {
        return { ok: false, error: text || "Invalid server response." };
      }
    }

    function renderLoggedOutState() {
      profileBox.innerHTML = `
        <strong>Status:</strong> Not signed in<br>
        <strong>Dashboard:</strong> Please log in to view your saved plan
      `;
      planSummaryBox.className = "empty-box";
      planSummaryBox.textContent = "You are not signed in.";
      weekTrackerBox.className = "empty-box";
      weekTrackerBox.textContent = "Please log in to use the dashboard.";
      calendarBox.className = "empty-box";
      calendarBox.textContent = "Please log in to use the dashboard.";
      streakBox.innerHTML = `<strong>Workout streak:</strong> 0`;
    }

    function renderProfile(user) {
      profileBox.innerHTML = `
        <strong>Username:</strong> ${user.username}<br>
        <strong>Email:</strong> ${user.email}<br>
        <strong>Age:</strong> ${user.age}<br>
        <strong>Age band:</strong> ${user.ageBand}<br>
        <strong>Parent or guardian required:</strong> ${user.parentRequired ? "Yes" : "No"}
      `;
    }

    function renderPlanSummary(plan) {
      if (!plan) {
        planSummaryBox.className = "empty-box";
        planSummaryBox.textContent = "No plan found yet.";
        return;
      }

      planSummaryBox.className = "summary-box";
      planSummaryBox.textContent = plan.summary || "Plan loaded.";
    }

    function splitIntoWeeks(schedule) {
      const weeks = [];
      for (let i = 0; i < schedule.length; i += 7) {
        weeks.push(schedule.slice(i, i + 7));
      }
      return weeks;
    }

    function formatWeekRange(week) {
      if (!week.length) return "Week";
      return `Week of ${week[0].dateLabel} to ${week[week.length - 1].dateLabel}`;
    }

    function workoutLetter(index) {
      return String.fromCharCode(65 + index);
    }

    function currentWeekIndex(plan) {
      const weeks = splitIntoWeeks(plan.schedule || []);
      const todayISO = new Date().toISOString().slice(0, 10);

      const idx = weeks.findIndex((week) => week.some((day) => day.date === todayISO));
      if (idx >= 0) return idx;

      const firstDate = plan.schedule?.[0]?.date;
      if (firstDate && todayISO < firstDate) return 0;

      return Math.max(0, Math.min(weeks.length - 1, 1));
    }

    function getExerciseHistory(plan, tracker, exerciseId, beforeDate) {
      const history = [];
      (plan.schedule || [])
        .filter((day) => day.date < beforeDate && day.type === "workout")
        .forEach((day) => {
          const dayLog = tracker.days?.[day.date]?.[exerciseId];
          if (dayLog) history.push(dayLog);
        });
      return history;
    }

    function toNumber(value, fallback) {
      const n = Number(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function getSafeExerciseDefaults(exercise) {
      const type = exercise?.targetType || "reps";

      if (type === "seconds") {
        return {
          start: toNumber(exercise?.start, 20),
          max: toNumber(exercise?.max, 60),
          step: toNumber(exercise?.step, 5),
          sets: toNumber(exercise?.sets, 2)
        };
      }

      if (type === "minutes") {
        return {
          start: toNumber(exercise?.start, 5),
          max: toNumber(exercise?.max, 20),
          step: toNumber(exercise?.step, 5),
          sets: toNumber(exercise?.sets, 1)
        };
      }

      return {
        start: toNumber(exercise?.start, 5),
        max: toNumber(exercise?.max, 10),
        step: toNumber(exercise?.step, 1),
        sets: toNumber(exercise?.sets, 3)
      };
    }

    function formatTargetValue(value, targetType) {
      if (targetType === "seconds") return `${value} sec`;
      if (targetType === "minutes") return `${value} min`;
      return `${value} reps`;
    }

    function getExerciseCategory(exerciseName) {
      const n = String(exerciseName || "").toLowerCase();

      if (n.includes("pull")) return "pull";
      if (n.includes("chin")) return "pull";
      if (n.includes("row")) return "pull";

      if (n.includes("push")) return "push";
      if (n.includes("press")) return "push";
      if (n.includes("shoulder")) return "push";

      if (n.includes("squat")) return "legs";
      if (n.includes("split")) return "legs";
      if (n.includes("deadlift")) return "legs";
      if (n.includes("hinge")) return "legs";
      if (n.includes("bridge")) return "legs";
      if (n.includes("hip thrust")) return "legs";

      if (n.includes("plank")) return "core";

      if (n.includes("run")) return "run";
      if (n.includes("tempo")) return "run";
      if (n.includes("repeat")) return "run";

      return "general";
    }

    function countSuccessfulSessions(history, target) {
      let count = 0;
      history.forEach((entry) => {
        if (Array.isArray(entry.values)) {
          const ok = entry.values.every((v, i) => Number(v) >= Number(target[i] || 0));
          if (ok) count += 1;
        } else if (entry.logText) {
          count += 1;
        }
      });
      return count;
    }

    function computeNextGoal(exercise, history) {
      const safe = getSafeExerciseDefaults(exercise);
      const progressionType = exercise.progressionType || "double";
      const category = getExerciseCategory(exercise.name);

      let current = safe.start;
      let advanceFlag = false;

      if (category === "run") {
        return {
          targetArray: Array(safe.sets).fill(current),
          advanceFlag: false
        };
      }

      if (progressionType === "static") {
        return {
          targetArray: Array(safe.sets).fill(current),
          advanceFlag: false
        };
      }

      history.forEach((entry) => {
        if (!Array.isArray(entry.values)) return;

        const target = Array(safe.sets).fill(current);
        const success = entry.values.every((v, i) => Number(v) >= Number(target[i] || 0));

        if (!success) return;

        if (progressionType === "ladder") {
          if (current < safe.max) {
            current += safe.step;
          } else {
            advanceFlag = true;
            current = safe.start;
          }
          return;
        }

        if (progressionType === "hold") {
          if (current < safe.max) current += safe.step;
          return;
        }

        if (progressionType === "double") {
          if (current < safe.max) {
            current += safe.step;
          } else {
            advanceFlag = true;
            current = safe.start;
          }
        }
      });

      return {
        targetArray: Array(safe.sets).fill(current),
        advanceFlag
      };
    }

    function getStatusText(exercise, goalState) {
      const category = getExerciseCategory(exercise.name);

      if (goalState.advanceFlag) {
        if (category === "pull") return "Progress";
        if (category === "push") return "Progress";
        if (category === "legs") return "Progress";
        if (category === "core") return "Progress";
        if (category === "run") return "Track";
        return "Progress";
      }

      return "Current";
    }

    function getLastLoadOrAssist(history) {
      for (let i = history.length - 1; i >= 0; i -= 1) {
        const entry = history[i];
        if (entry && entry.loadValue !== undefined && entry.loadType) {
          return {
            loadType: entry.loadType,
            loadValue: Number(entry.loadValue) || 0
          };
        }
      }
      return null;
    }

    function getNextLoadSuggestion(exercise, history, goalState) {
      const category = getExerciseCategory(exercise.name);
      const last = getLastLoadOrAssist(history);

      if (!last) return "Log a load or assistance value to unlock the next suggestion.";

      if (!goalState.advanceFlag) {
        if (last.loadType === "assistance") {
          return `Keep assistance at ${last.loadValue} lb for now.`;
        }
        return `Keep load at ${last.loadValue} lb for now.`;
      }

      if (category === "pull" && last.loadType === "assistance") {
        const nextAssist = Math.max(0, last.loadValue - 5);
        return `Next time: reduce assistance to ${nextAssist} lb.`;
      }

      if (last.loadType === "load") {
        const bump = category === "legs" ? 5 : 2.5;
        return `Next time: increase load to ${last.loadValue + bump} lb if form stays clean.`;
      }

      if (last.loadType === "assistance") {
        const nextAssist = Math.max(0, last.loadValue - 5);
        return `Next time: reduce assistance to ${nextAssist} lb.`;
      }

      return "Progress load only when all sets are clean.";
    }

    function createRunningTracker(plan, tracker, day, exercise) {
      const safe = getSafeExerciseDefaults(exercise);
      const history = getExerciseHistory(plan, tracker, exercise.id, day.date);
      const goalState = computeNextGoal({ ...exercise, ...safe }, history);

      const todayISO = new Date().toISOString().slice(0, 10);
      const unlocked = day.date === todayISO;
      const existing = tracker.days?.[day.date]?.[exercise.id] || {};

      const wrap = document.createElement("div");
      wrap.className = "tracker-exercise";

      const head = document.createElement("div");
      head.className = "tracker-ex-head";

      const left = document.createElement("div");
      left.innerHTML = `
        <div class="tracker-ex-name">${exercise.name || "Run"}</div>
        <div class="tracker-meta">
          <span class="meta-pill tempo">Tempo ${exercise.tempo || "Controlled"}</span>
          <span class="meta-pill">Goal ${safe.start} min</span>
        </div>
      `;

      const right = document.createElement("div");
      right.className = "tracker-chip";
      right.textContent = getStatusText(exercise, goalState);

      head.appendChild(left);
      head.appendChild(right);
      wrap.appendChild(head);

      const logRow = document.createElement("div");
      logRow.className = "small-note";
      logRow.innerHTML = `
        <label>Log (distance covered / notes)</label>
        <input class="small-input" data-run-log-day="${day.date}" data-run-log-ex="${exercise.id}" type="text" placeholder="Example: 0.82 miles, felt smooth" value="${existing.logText || ""}" ${unlocked ? "" : "disabled"} />
      `;
      wrap.appendChild(logRow);

      if (!unlocked) {
        const lock = document.createElement("div");
        lock.className = "lock-note";
        lock.textContent = `This unlocks on ${day.dateLabel}.`;
        wrap.appendChild(lock);
      }

      return wrap;
    }

    function createStrengthTracker(plan, tracker, day, exercise) {
      const safe = getSafeExerciseDefaults(exercise);
      const mergedExercise = { ...exercise, ...safe };

      const history = getExerciseHistory(plan, tracker, exercise.id, day.date);
      const goalState = computeNextGoal(mergedExercise, history);

      const todayISO = new Date().toISOString().slice(0, 10);
      const unlocked = day.date === todayISO;
      const existing = tracker.days?.[day.date]?.[exercise.id] || {};

      const wrap = document.createElement("div");
      wrap.className = "tracker-exercise";

      const head = document.createElement("div");
      head.className = "tracker-ex-head";

      const left = document.createElement("div");
      left.innerHTML = `
        <div class="tracker-ex-name">${mergedExercise.name || "Exercise"}</div>
        <div class="tracker-meta">
          <span class="meta-pill tempo">Tempo ${mergedExercise.tempo || "Controlled"}</span>
          <span class="meta-pill">Rest ${mergedExercise.rest || "60 sec"}</span>
        </div>
      `;

      const right = document.createElement("div");
      right.className = `tracker-chip ${goalState.advanceFlag ? "ready" : ""}`;
      right.textContent = getStatusText(mergedExercise, goalState);

      head.appendChild(left);
      head.appendChild(right);
      wrap.appendChild(head);

      const table = document.createElement("div");
      table.className = "tracker-table";

      const header = document.createElement("div");
      header.className = "tracker-row header";
      header.innerHTML = `<div>Set</div><div>Goal</div><div>Log</div>`;
      table.appendChild(header);

      const existingValues = existing.values || [];

      goalState.targetArray.forEach((target, i) => {
        const row = document.createElement("div");
        row.className = "tracker-row";
        row.innerHTML = `
          <div>Set ${i + 1}</div>
          <div class="tracker-goal">${formatTargetValue(target, mergedExercise.targetType)}</div>
          <div><input class="small-input" data-day="${day.date}" data-ex="${exercise.id}" data-set="${i}" type="text" inputmode="numeric" value="${existingValues[i] || ""}" ${unlocked ? "" : "disabled"} /></div>
        `;
        table.appendChild(row);
      });

      wrap.appendChild(table);

      const loadType = existing.loadType || "load";
      const loadValue = existing.loadValue ?? "";

      const loadBlock = document.createElement("div");
      loadBlock.className = "small-note";
      loadBlock.innerHTML = `
        <label>Assistance or load</label>
        <div class="tracker-load-grid">
          <select class="small-input" data-load-type-day="${day.date}" data-load-type-ex="${exercise.id}" ${unlocked ? "" : "disabled"}>
            <option value="load" ${loadType === "load" ? "selected" : ""}>Load</option>
            <option value="assistance" ${loadType === "assistance" ? "selected" : ""}>Assistance</option>
          </select>
          <input class="small-input" data-load-value-day="${day.date}" data-load-value-ex="${exercise.id}" type="text" inputmode="decimal" placeholder="Example: 35" value="${loadValue}" ${unlocked ? "" : "disabled"} />
        </div>
      `;
      wrap.appendChild(loadBlock);

      const successCount = countSuccessfulSessions(history, goalState.targetArray);

      const help = document.createElement("div");
      help.className = "tracker-help";
      help.innerHTML = `
        <strong>Starter:</strong> ${formatTargetValue(safe.start, mergedExercise.targetType)}<br>
        <strong>Success count:</strong> ${successCount} successful comparable session(s)<br>
        <strong>Next suggestion:</strong> ${getNextLoadSuggestion(mergedExercise, history, goalState)}
      `;
      wrap.appendChild(help);

      if (!unlocked) {
        const lock = document.createElement("div");
        lock.className = "lock-note";
        lock.textContent = `This unlocks on ${day.dateLabel}.`;
        wrap.appendChild(lock);
      }

      return wrap;
    }

    function createExerciseTracker(plan, tracker, day, exercise) {
      const category = getExerciseCategory(exercise.name);
      if (category === "run") return createRunningTracker(plan, tracker, day, exercise);
      return createStrengthTracker(plan, tracker, day, exercise);
    }

    function countWorkoutStreak(plan, tracker) {
      const todayISO = new Date().toISOString().slice(0, 10);

      const workoutDates = (plan.schedule || [])
        .filter((day) => day.type === "workout" && day.date <= todayISO)
        .map((day) => day.date);

      let streak = 0;
      for (let i = workoutDates.length - 1; i >= 0; i -= 1) {
        const dayLog = tracker.days?.[workoutDates[i]];
        const done = dayLog && Object.keys(dayLog).length > 0;
        if (done) streak += 1;
        else break;
      }

      return streak;
    }

    function renderWeekTracker(plan) {
      const tracker = loadTracker(plan);
      const weeks = splitIntoWeeks(plan.schedule || []);
      const week = weeks[currentWeekIndex(plan)] || [];

      weekTrackerBox.className = "";
      weekTrackerBox.innerHTML = "";

      const section = document.createElement("section");
      section.className = "week-section";

      const title = document.createElement("div");
      title.className = "week-title";
      title.textContent = formatWeekRange(week);
      section.appendChild(title);

      const grid = document.createElement("div");
      grid.className = "week-grid";

      let letterIndex = 0;

      week.forEach((day) => {
        const card = document.createElement("div");
        card.className = `day-card ${day.type === "rest" ? "rest" : ""}`;

        let dayLabel = "Rest";
        if (day.type === "workout") {
          dayLabel = workoutLetter(letterIndex);
          letterIndex += 1;
        }

        card.innerHTML = `
          <div class="day-top">
            <div>
              <div class="day-letter">Day ${dayLabel}</div>
              <div class="day-date">${day.dateLabel}</div>
              <div class="helper">${day.title}</div>
            </div>
            <span class="badge ${day.type === "rest" ? "rest" : ""}">${day.goal}</span>
          </div>
        `;

        if (day.type === "rest") {
          const p = document.createElement("div");
          p.className = "helper";
          p.textContent = "Recovery day.";
          card.appendChild(p);
          grid.appendChild(card);
          return;
        }

        if (day.warmup?.length) {
          const warm = document.createElement("div");
          warm.className = "session-block";
          warm.innerHTML = "<h4>Warm-up</h4>";
          const ul = document.createElement("ul");
          day.warmup.forEach((item) => {
            const li = document.createElement("li");
            li.textContent = item;
            ul.appendChild(li);
          });
          warm.appendChild(ul);
          card.appendChild(warm);
        }

        (day.exercises || []).forEach((exercise) => {
          card.appendChild(createExerciseTracker(plan, tracker, day, exercise));
        });

        if (day.cooldown?.length) {
          const cool = document.createElement("div");
          cool.className = "session-block";
          cool.innerHTML = "<h4>Cooldown</h4>";
          const ul = document.createElement("ul");
          day.cooldown.forEach((item) => {
            const li = document.createElement("li");
            li.textContent = item;
            ul.appendChild(li);
          });
          cool.appendChild(ul);
          card.appendChild(cool);
        }

        const actions = document.createElement("div");
        actions.className = "tracker-actions";

        const todayISO = new Date().toISOString().slice(0, 10);
        const unlocked = day.date === todayISO;

        const saveBtn = document.createElement("button");
        saveBtn.textContent = "Save day log";
        if (!unlocked) saveBtn.disabled = true;

        saveBtn.addEventListener("click", () => {
          const nextTracker = loadTracker(plan);
          if (!nextTracker.days[day.date]) nextTracker.days[day.date] = {};

          const repInputs = card.querySelectorAll("input[data-day]");
          const loadTypeSelects = card.querySelectorAll("select[data-load-type-day]");
          const loadValueInputs = card.querySelectorAll("input[data-load-value-day]");
          const runLogInputs = card.querySelectorAll("input[data-run-log-day]");

          const grouped = {};

          repInputs.forEach((input) => {
            const exId = input.dataset.ex;
            if (!grouped[exId]) grouped[exId] = {};
            if (!grouped[exId].values) grouped[exId].values = [];
            grouped[exId].values[Number(input.dataset.set)] = Number(input.value || 0);
          });

          loadTypeSelects.forEach((select) => {
            const exId = select.dataset.loadTypeEx;
            if (!grouped[exId]) grouped[exId] = {};
            grouped[exId].loadType = select.value;
          });

          loadValueInputs.forEach((input) => {
            const exId = input.dataset.loadValueEx;
            if (!grouped[exId]) grouped[exId] = {};
            grouped[exId].loadValue = Number(input.value || 0);
          });

          runLogInputs.forEach((input) => {
            const exId = input.dataset.runLogEx;
            if (!grouped[exId]) grouped[exId] = {};
            grouped[exId].logText = input.value || "";
          });

          Object.entries(grouped).forEach(([exId, entry]) => {
            nextTracker.days[day.date][exId] = {
              ...entry,
              savedAt: new Date().toISOString()
            };
          });

          saveTracker(plan, nextTracker);
          renderWeekTracker(plan);
          renderCalendar(plan);
          streakBox.innerHTML = `<strong>Workout streak:</strong> ${countWorkoutStreak(plan, nextTracker)}`;
        });

        actions.appendChild(saveBtn);
        card.appendChild(actions);

        grid.appendChild(card);
      });

      section.appendChild(grid);
      weekTrackerBox.appendChild(section);

      streakBox.innerHTML = `<strong>Workout streak:</strong> ${countWorkoutStreak(plan, tracker)}`;
    }

    function renderCalendar(plan) {
      const weeks = splitIntoWeeks(plan.schedule || []);

      calendarBox.className = "";
      calendarBox.innerHTML = "";

      weeks.forEach((week) => {
        const section = document.createElement("section");
        section.className = "week-section";

        const title = document.createElement("div");
        title.className = "week-title";
        title.textContent = formatWeekRange(week);
        section.appendChild(title);

        const grid = document.createElement("div");
        grid.className = "calendar-grid";

        let letterIndex = 0;

        week.forEach((day) => {
          const card = document.createElement("div");
          card.className = "calendar-card";

          let dayLabel = "Rest";
          if (day.type === "workout") {
            dayLabel = workoutLetter(letterIndex);
            letterIndex += 1;
          }

          const exerciseNames = (day.exercises || []).map((ex) => ex.name).join(", ") || "Recovery";

          card.innerHTML = `
            <div class="day-top">
              <div>
                <div class="day-date">${day.dateLabel}</div>
                <div class="helper">Day ${dayLabel}</div>
              </div>
              <span class="badge ${day.type === "rest" ? "rest" : ""}">${day.goal}</span>
            </div>
            <div class="helper">${exerciseNames}</div>
          `;

          grid.appendChild(card);
        });

        section.appendChild(grid);
        calendarBox.appendChild(section);
      });
    }

    async function loadDashboard() {
      const user = getUser();

      if (!token || !user) {
        renderLoggedOutState();
        return;
      }

      try {
        const me = await apiGet("/me");
        if (me.ok && me.user) {
          localStorage.setItem("fitnessplan_user", JSON.stringify(me.user));
          renderProfile(me.user);
        } else {
          renderProfile(user);
        }
      } catch {
        renderProfile(user);
      }

      let plan = getPlan();

      try {
        const planData = await apiGet("/my-plan");
        if (planData.ok && planData.plan) {
          plan = planData.plan;
          localStorage.setItem("fitnessplan_latest_plan", JSON.stringify(plan));
        }
      } catch {}

      renderPlanSummary(plan);

      if (!plan) {
        weekTrackerBox.className = "empty-box";
        weekTrackerBox.textContent = "No plan found yet.";
        calendarBox.className = "empty-box";
        calendarBox.textContent = "No plan found yet.";
        return;
      }

      renderWeekTracker(plan);
      renderCalendar(plan);
    }

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      if (token) {
        try {
          await fetch(`${API}/logout`, {
            method: "POST",
            headers: { Authorization: `Bearer ${token}` }
          });
        } catch {}
      }

      localStorage.removeItem("fitnessplan_token");
      localStorage.removeItem("fitnessplan_user");

      window.location.href = "./account-test.html";
    });

    loadDashboard();
  </script>
</body>
</html>
